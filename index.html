<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Phần mềm luyện trí nhớ</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
        text-align: center;
      }

      h1 {
        margin-bottom: 20px;
      }

      .controls {
        margin-bottom: 20px;
      }

      input {
        width: 80px;
        padding: 8px;
        margin: 0 5px;
      }

      button {
        padding: 8px 15px;
        cursor: pointer;
        margin: 5px;
      }

      #symbols {
        margin: 20px 0;
      }

      .symbol {
        font-size: 30px;
        margin: 5px;
        cursor: pointer;
        padding: 5px;
        border: 2px solid transparent;
        border-radius: 8px;
        display: inline-block;
      }

      .symbol.selected {
        border-color: #2196f3;
        background: white;
      }

      #grid {
        display: grid;
        gap: 5px;
        justify-content: center;
        margin-top: 20px;
      }

      .cell {
        width: 60px;
        height: 60px;
        background: white;
        border: 1px solid #ccc;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        cursor: pointer;
        user-select: none;
        border-radius: 8px;
      }

      .cell:hover {
        background: #eeeeee;
      }
    </style>
  </head>
  <body>
    <h1>🧠 Phần mềm luyện trí nhớ</h1>

    <div class="controls">
      Hàng:
      <input type="number" id="rows" value="5" min="1" />

      Cột:
      <input type="number" id="cols" value="5" min="1" />

      <button onclick="createGrid()">Tạo bảng</button>

      <button onclick="clearAll()">Clear</button>
    </div>

    <div id="symbols"></div>

    <div id="grid"></div>

    <script>
      const symbols = ["🌧️", "⚡", "☀️", "🌙", "🌬️", "☃️", "⭐", "🔍", "😀"];

      let selectedSymbol = symbols[0];

      const symbolsContainer = document.getElementById("symbols");

      symbols.forEach((symbol, index) => {
        const btn = document.createElement("span");

        btn.className = "symbol";
        btn.textContent = symbol;

        if (index === 0) {
          btn.classList.add("selected");
        }

        btn.onclick = () => {
          document
            .querySelectorAll(".symbol")
            .forEach((item) => item.classList.remove("selected"));

          btn.classList.add("selected");

          selectedSymbol = symbol;
        };

        symbolsContainer.appendChild(btn);
      });

      function createGrid() {
        const rows = parseInt(document.getElementById("rows").value);

        const cols = parseInt(document.getElementById("cols").value);

        const grid = document.getElementById("grid");

        grid.innerHTML = "";

        grid.style.gridTemplateColumns = `repeat(${cols},60px)`;

        const savedData = JSON.parse(localStorage.getItem("memoryGrid"));

        let cellsData = [];

        if (savedData && savedData.rows == rows && savedData.cols == cols) {
          cellsData = savedData.cells;
        }

        for (let i = 0; i < rows * cols; i++) {
          const cell = document.createElement("div");

          cell.className = "cell";

          cell.textContent = cellsData[i] || "";

          cell.onclick = () => {
            if (selectedSymbol) {
              cell.textContent = selectedSymbol;
            }

            saveGrid();
          };

          grid.appendChild(cell);
        }

        saveGrid();
      }

      function saveGrid() {
        const rows = document.getElementById("rows").value;

        const cols = document.getElementById("cols").value;

        const cells = [];

        document.querySelectorAll(".cell").forEach((cell) => {
          cells.push(cell.textContent);
        });

        const data = {
          rows,
          cols,
          cells,
        };

        localStorage.setItem("memoryGrid", JSON.stringify(data));
      }

      function loadGrid() {
        const savedData = JSON.parse(localStorage.getItem("memoryGrid"));

        if (!savedData) {
          createGrid();
          return;
        }

        document.getElementById("rows").value = savedData.rows;

        document.getElementById("cols").value = savedData.cols;

        createGrid();
      }

      function clearAll() {
        if (!confirm("Bạn có muốn xóa toàn bộ dữ liệu?")) {
          return;
        }

        localStorage.removeItem("memoryGrid");

        document.getElementById("rows").value = 5;
        document.getElementById("cols").value = 5;

        createGrid();
      }

      window.onload = () => {
        loadGrid();
      };
    </script>
  </body>
</html>
