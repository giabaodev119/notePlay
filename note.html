<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Grid</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        text-align: center;
      }

      .controls {
        margin-bottom: 20px;
      }

      input {
        width: 70px;
        padding: 5px;
      }

      button {
        padding: 8px 15px;
        cursor: pointer;
      }

      #symbols {
        margin: 20px 0;
      }

      .symbol {
        font-size: 30px;
        cursor: pointer;
        margin: 5px;
        padding: 5px;
        border: 2px solid transparent;
      }

      .symbol.selected {
        border: 2px solid blue;
        border-radius: 5px;
      }

      #grid {
        display: grid;
        gap: 5px;
        justify-content: center;
      }

      .cell {
        width: 60px;
        height: 60px;
        border: 1px solid #ccc;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        cursor: pointer;
        background: white;
      }

      .cell:hover {
        background: #f0f0f0;
      }
    </style>
  </head>
  <body>
    <h2>Memory Grid</h2>

    <div class="controls">
      Hàng:
      <input type="number" id="rows" value="4" min="1" />

      Cột:
      <input type="number" id="cols" value="4" min="1" />

      <button onclick="createGrid()">Tạo bảng</button>
      <button onclick="clearGrid()">Clear</button>
    </div>

    <div id="symbols"></div>

    <div id="grid"></div>

    <script>
      const symbols = ["🌧️", "⚡", "☀️", "🌙", "🌬️", "☃️", "⭐", "🔍", "😀"];

      let selectedSymbol = symbols[0];

      const symbolsContainer = document.getElementById("symbols");

      symbols.forEach((symbol) => {
        const btn = document.createElement("span");
        btn.className = "symbol";
        btn.textContent = symbol;

        btn.onclick = () => {
          document
            .querySelectorAll(".symbol")
            .forEach((x) => x.classList.remove("selected"));

          btn.classList.add("selected");
          selectedSymbol = symbol;
        };

        symbolsContainer.appendChild(btn);
      });

      symbolsContainer.firstChild.classList.add("selected");

      function createGrid() {
        const rows = parseInt(document.getElementById("rows").value);
        const cols = parseInt(document.getElementById("cols").value);

        const grid = document.getElementById("grid");

        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${cols}, 60px)`;

        for (let i = 0; i < rows * cols; i++) {
          const cell = document.createElement("div");
          cell.className = "cell";

          cell.onclick = () => {
            cell.textContent = selectedSymbol;
          };

          grid.appendChild(cell);
        }
      }

      function clearGrid() {
        document.querySelectorAll(".cell").forEach((cell) => {
          cell.textContent = "";
        });
      }

      createGrid();
    </script>
  </body>
</html>
